# MCUboot serial recovery over USB CDC ACM
CONFIG_MCUBOOT_SERIAL=y
CONFIG_BOOT_SERIAL_CDC_ACM=y

# No button — wait for DFU connection on every boot
CONFIG_BOOT_SERIAL_ENTRANCE_GPIO=n
CONFIG_BOOT_SERIAL_WAIT_FOR_DFU=y
CONFIG_BOOT_SERIAL_WAIT_FOR_DFU_TIMEOUT=1000

# USB
CONFIG_USB_DEVICE_STACK=y
CONFIG_MULTITHREADING=y

# Flash
CONFIG_FLASH=y
CONFIG_FPROTECT=y

# Disable signature validation (development only)
CONFIG_BOOT_SIGNATURE_TYPE_NONE=y
CONFIG_BOOT_SIGNATURE_TYPE_RSA=n

# GPIO (LED indication disabled — needs led0 alias; v1.1 DT only has led_b/led_g/led_r)
CONFIG_GPIO=y
CONFIG_MCUBOOT_INDICATION_LED=n
