mcuboot:
  address: 0x0
  end_address: 0x20000
  region: flash_primary
  placement:
    before:
    - mcuboot_primary
  size: 0x20000

mcuboot_pad:
  address: 0x20000
  end_address: 0x20200
  placement:
    align:
      start: 0x1000
    before:
    - mcuboot_primary_app
  region: flash_primary
  size: 0x200

mcuboot_primary:
  address: 0x20000
  end_address: 0x88000
  orig_span: &id001
  - app
  - mcuboot_pad
  region: flash_primary
  sharers: 0x1
  size: 0x68000
  span: *id001

mcuboot_primary_app:
  address: 0x20200
  end_address: 0x88000
  orig_span: &id002
  - app
  region: flash_primary
  size: 0x67e00
  span: *id002

app:
  address: 0x20200
  end_address: 0x88000
  region: flash_primary
  size: 0x67e00

mcuboot_secondary:
  address: 0x88000
  end_address: 0xf0000
  placement:
    after:
    - mcuboot_primary
    align:
      start: 0x1000
  region: flash_primary
  share_size:
  - mcuboot_primary
  size: 0x68000

storage:
  address: 0xf0000
  end_address: 0x100000
  placement:
    align:
      start: 0x1000
    before:
    - end
  region: flash_primary
  size: 0x10000

sram_primary:
  address: 0x20000000
  end_address: 0x20040000
  region: sram_primary
  size: 0x40000
